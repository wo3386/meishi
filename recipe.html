<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美食食谱 - 详情</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/recipe.css">
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">🍳</span>
        <div class="logo-text">
          <h1>美食食谱</h1>
          <p>用心做好每一道菜</p>
        </div>
      </div>
    </div>
    <nav class="header-nav">
      <a href="index.html" class="nav-item">首页</a>
      <a href="index.html" class="nav-item">热门推荐</a>
      <a href="index.html" class="nav-item">最新菜谱</a>
      <a href="index.html" class="nav-item">分类</a>
    </nav>
  </header>

  <div class="search-bar">
    <span class="search-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </span>
    <input type="text" class="search-input" placeholder="输入菜名或食材...">
  </div>

  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-title">菜谱分类</h3>
        <ul class="category-list">
          <li class="category-item active">全部菜谱</li>
          <li class="category-item">中华美食</li>
          <li class="category-item">西餐烘焙</li>
          <li class="category-item">小吃甜点</li>
          <li class="category-item">汤羹饮品</li>
          <li class="category-item">沙拉凉菜</li>
        </ul>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-title">今日推荐</h3>
        <ul class="recommend-list">
          <li class="recommend-item">🍖 红烧排骨</li>
          <li class="recommend-item">🌶️ 麻婆豆腐</li>
          <li class="recommend-item">🍅 番茄炒蛋</li>
        </ul>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-title">🎲 随机一道菜</h3>
        <button class="random-btn">摇一摇</button>
        <div class="random-result">
          <p class="random-placeholder">点击按钮试试手气</p>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="detail-toolbar">
        <a href="index.html" class="toolbar-btn back-btn">← 返回菜谱列表</a>
        <button class="toolbar-btn print-btn" onclick="window.print()">🖨️ 打印菜谱</button>
      </div>

      <div class="detail-card" id="recipeDetail">
        <div class="loading">加载中...</div>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/recipe.js"></script>
</body>
</html>
